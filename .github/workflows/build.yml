name: Build PETSc & Firedrake

on:
  workflow_dispatch:
    inputs:
      do_64bit:
        description: "Build petsc/firedrake with 64-bit indices?"
        required: false
        type: boolean
      build_branch:
        description: "Select a firedrake branch to build (blank for master)"
        required: false
        type: string
      firedrake_repo:
        description: "Select a firedrake repository to build (blank for firedrakeproject/firedrake)"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
    - name: Configure SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{secrets.GADI_TESTING_KEY}}" > ~/.ssh/gadi.key
        chmod 600 ~/.ssh/gadi.key
        echo "${{secrets.GADI_HOST_KEY}}" >> ~/.ssh/known_hosts
        chmod 600 ~/.ssh/known_hosts
        cat > ~/.ssh/config <<EOF
        Host gadi
          Hostname gadi.nci.org.au
          User ${{secrets.GADI_USER}}
          IdentityFile ~/.ssh/gadi.key
        EOF
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Scrape build settings
      run: |
        source scripts/gadi/build-config.sh
        echo BUILD_STAGE_DIR=$BUILD_STAGE_DIR >> $GITHUB_ENV
    - name: Set petsc build type
      if: ${{ inputs.do_64bit }}
      run: echo "QSUB_FLAG_64BIT=,DO_64BIT=1" >> $GITHUB_ENV
    - name: Select firedrake repo
      run: echo FIREDRAKE_REPO=${{ inputs.firedrake_repo || 'firedrakeproject/firedrake' }} >> $GITHUB_ENV
    - name: Select firedrake branch
      if: ${{ inputs.build_branch }}
      run: echo QSUB_FLAG_BRANCH=${{ format(',BUILD_BRANCH={0}',  inputs.build_branch ) }} >> $GITHUB_ENV
    - name: Sync repository to Gadi
      run: |
        rsync -avz --delete --exclude=/.git/ --exclude=/.github/ ./ gadi:${{secrets.GADI_REPO_PATH}}
    - name: Checkout PETSc
      uses: actions/checkout@v4
      with:
        repository: firedrakeproject/petsc
        ref: firedrake
        path: petsc
    - name: Checkout Firedrake
      uses: actions/checkout@v4
      with:
        repository: ${{ env.FIREDRAKE_REPO }}
        ref: ${{ inputs.build_branch || 'master'}}
        path: firedrake
    - name: Package Petsc
      run: |
        tar -cf petsc.tar petsc
    - name: Package Firedrake
      run: |
        tar -cf firedrake.tar firedrake
    - name: Sync petsc and firedrake to Gadi
      run: |
        scp firedrake.tar petsc.tar gadi:$BUILD_STAGE_DIR/
    - name: Build petsc
      run: |
        ssh gadi "cd ${{secrets.GADI_REPO_PATH}}/scripts; qsub -P fp50 -Wblock=true -lncpus=12,mem=48GB,walltime=2:00:00,jobfs=100GB,storage=gdata/xd2+scratch/xd2+gdata/fp50+scratch/fp50,ood=jupyterlab -v REPO_PATH=${{secrets.GADI_REPO_PATH}}"$QSUB_FLAG_64BIT" build-petsc.sh"
    - name: Build firedrake
      run: |
        ssh gadi "cd ${{secrets.GADI_REPO_PATH}}/scripts; qsub -P fp50 -Wblock=true -lncpus=1,mem=16GB,walltime=1:00:00,jobfs=100GB,storage=gdata/xd2+scratch/xd2+gdata/fp50+scratch/fp50 -q copyq -v REPO_PATH=${{secrets.GADI_REPO_PATH}}"$QSUB_FLAG_64BIT$QSUB_FLAG_BRANCH" build-firedrake.sh"
 