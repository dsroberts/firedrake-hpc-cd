name: Build PETSc and Firedrake in preparation for running G-ADOPT longtests

on:
  schedule:
    - cron: "5 19 * * 0"
  
  workflow_dispatch:

jobs:
  run_fortnightly:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check_date.outputs.skip }}
    steps:
      - name: Always run tests on workflow dispatch
        id: early_exit
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run:
          echo skip=true >> "$GITHUB_OUTPUT"
      - name: Check date
        if: ${{ steps.early_exit.outputs.skip != 'true' }}
        id: check_date
        run: |
          day=$( date +%_d )
          if [[ ${day} -gt 7 ]] && [[ ${day} -le 14 ]]; then
              echo skip=true >> "$GITHUB_OUTPUT"
          elif [[ ${day} -gt 21 ]]; then
              echo skip=true >> "$GITHUB_OUTPUT"
          fi

  build:
    env:
      REPO_PATH: ${{ secrets['GADI_REPO_PATH'] }}
    runs-on: ubuntu-latest

    needs: run_fortnightly
    if: ${{ needs.run_fortnightly.outputs.skip != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup ssh
        uses: ./.github/actions/setup_ssh
        env:
          TEST_KEY: ${{ secrets['GADI_TESTING_KEY'] }}
          HOST_KEY: ${{ secrets['GADI_HOST_KEY'] }}
          USER: ${{ secrets['GADI_USER'] }}
        with:
          system: gadi
      - name: Transfer ${{ github.event.repository.name }} repo
        uses: ./.github/actions/prepare_and_transfer_repo
        with:
          system: gadi
      - name: Setup Firedrake source
        uses: ./.github/actions/setup_app_source
        with:
          system: gadi
          app: firedrake
          repo: firedrakeproject/firedrake
          branch: main
      - name: Checkout petsc
        uses: ./.github/actions/setup_app_source_gitlab
        with:
          system: gadi
          app: petsc
          repo: petsc/petsc
          branch: main
      - name: Set build variables
        uses: ./.github/actions/set_build_vars
      - name: Scrape build settings
        id: scrape_settings
        shell: bash
        run: |
          source scripts/gadi/build-config.sh
          echo apps_prefix=$APPS_PREFIX >> $GITHUB_OUTPUT
          echo module_prefix=$MODULE_PREFIX >> $GITHUB_OUTPUT
      - name: Clean old longtest builds
        run: |
          export DATESTAMP=$( date -d @$(( $( date +%s ) - 60*86400 )) +%F )
          ssh gadi "find ${{steps.scrape_settings.outputs.apps_prefix}}/firedrake ${{steps.scrape_settings.outputs.apps_prefix}}/firedrake-scripts ${{steps.scrape_settings.outputs.apps_prefix}}/petsc ${{steps.scrape_settings.outputs.module_prefix}}/firedrake ${{steps.scrape_settings.outputs.module_prefix}}/petsc -maxdepth 1 -name \*main\* ! -newermt ${DATESTAMP} -exec rm -rf {} \;"

      - name: Set build commands
        run: | 
          ./.github/scripts/build_submit_command.sh gadi petsc >> $GITHUB_ENV
          ./.github/scripts/build_submit_command.sh gadi firedrake >> $GITHUB_ENV
      - name: Build PETSc
        run: |
          ssh gadi "cd $REPO_PATH/scripts; ${PETSC_SUBMIT_COMMAND}"
      - name: Build firedrake
        run: |
          ssh gadi "cd $REPO_PATH/scripts; ${FIREDRAKE_SUBMIT_COMMAND}"