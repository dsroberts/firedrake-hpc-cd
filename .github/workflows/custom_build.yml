name: Build PETSc & Firedrake

on:
  workflow_dispatch:
    inputs:
      system:
        description: "Select a system to build on"
        required: true
        type: choice
        options:
          - gadi
          - setonix
      do_64bit:
        description: "Build petsc/firedrake with 64-bit indices?"
        required: false
        type: boolean
      build_branch:
        description: "Select a firedrake branch to build"
        required: true
        type: string
      firedrake_repo:
        description: "Select a firedrake repository to build (leave blank for firedrakeproject/firedrake)"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      ### N.B this step cannot be placed in a composite action
      ### due to secrets access
      - name: Get system-specific variable names
        run: |
          tmp=${{ inputs.system }}
          echo key_var=${tmp^^}_TESTING_KEY >> $GITHUB_ENV
          echo hkey_var=${tmp^^}_HOST_KEY >> $GITHUB_ENV
          echo user_var=${tmp^^}_USER >> $GITHUB_ENV
          echo repo_path_var=${tmp^^}_REPO_PATH >> $GITHUB_ENV
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup ssh and transfer ${{ github.event.repository.name }} repo
        uses: ./.github/actions/prepare_and_transfer_repo
        with:
          system: ${{ inputs.system }}
          sshkey: ${{ secrets[env.key_var] }}
          hostkey: ${{ secrets[env.hkey_var] }}
          user: ${{ secrets[env.user_var] }}
          repopath: ${{ secrets[env.repo_path_var] }}
      - name: Set build variables
        uses: ./.github/actions/set_build_vars
        with:
          do_64bit: ${{ inputs.do_64bit }}
          firedrake_repo: ${{ inputs.firedrake_repo }}
          build_branch: ${{ inputs.build_branch }}
      - name: Setup PETSc source
        uses: ./.github/actions/setup_app_source
        with:
          system: ${{ inputs.system }}
          app: petsc
          repo: firedrakeproject/petsc
          branch: firedrake
      - name: Setup Firedrake source
        uses: ./.github/actions/setup_app_source
        with:
          system: ${{ inputs.system }}
          app: firedrake
          repo: ${{ env.FIREDRAKE_REPO }}
          branch: ${{ inputs.build_branch }}
      - name: Build petsc
        run: |
          ssh ${{inputs.system}} "cd ${{ secrets[env.repo_path_var] }}/scripts; qsub -P fp50 -Wblock=true -lncpus=12,mem=48GB,walltime=2:00:00,jobfs=100GB,storage=gdata/xd2+scratch/xd2+gdata/fp50+scratch/fp50,ood=jupyterlab -v REPO_PATH=${{ secrets[env.repo_path_var] }}"$QSUB_FLAG_64BIT" build-petsc.sh"
      - name: Build firedrake
        run: |
          ssh ${{inputs.system}} "cd ${{ secrets[env.repo_path_var] }}/scripts; qsub -P fp50 -Wblock=true -lncpus=1,mem=16GB,walltime=1:00:00,jobfs=100GB,storage=gdata/xd2+scratch/xd2+gdata/fp50+scratch/fp50 -q copyq -v REPO_PATH=${{ secrets[env.repo_path_var] }}"$QSUB_FLAG_64BIT$QSUB_FLAG_BRANCH" build-firedrake.sh"
